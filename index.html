<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- ✅ Primary SEO -->
    <title>Brights Green Energy Pvt Ltd | Solar & Renewable Energy Solutions</title>
    <meta name="description" content="Brights Green Energy Pvt Ltd provides advanced solar and renewable energy solutions including EPC, solar installations, and sustainable power generation across India." />
    <meta name="keywords" content="solar energy, renewable energy, green energy India, solar EPC, solar installation, clean energy company, Brights Green Energy" />
    <meta name="author" content="Brights Green Energy Pvt Ltd" />

    <!-- ✅ Favicon -->
    <link rel="icon" href="/favicon.ico" />

    <!-- ✅ Open Graph (for WhatsApp, LinkedIn, Facebook) -->
    <meta property="og:title" content="Brights Green Energy Pvt Ltd" />
    <meta property="og:description" content="Powering the next generation of clean energy with solar and renewable solutions." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://yourdomain.com" />
    <meta property="og:image" content="https://yourdomain.com/og-image.jpg" />

    <!-- ✅ Twitter SEO -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Brights Green Energy Pvt Ltd" />
    <meta name="twitter:description" content="Leading solar and renewable energy solutions provider in India." />
    <meta name="twitter:image" content="https://yourdomain.com/og-image.jpg" />

    <!-- ✅ Canonical URL -->
    <link rel="canonical" href="https://yourdomain.com" />

    <!-- ✅ Robots -->
    <meta name="robots" content="index, follow" />

    <!-- ✅ Theme Color (Mobile UI) -->
    <meta name="theme-color" content="#0f766e" />

    <!-- ✅ Structured Data (VERY IMPORTANT for SEO🔥) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "Brights Green Energy Pvt Ltd",
        "url": "https://yourdomain.com",
        "logo": "https://yourdomain.com/logo.png",
